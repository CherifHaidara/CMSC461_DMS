{% extends 'layout.html' %}
{% block title %}Add Payment{% endblock %}

{% block content %}
<h2>Record Payment for Loan #{{ loan.loan_id }}</h2>
<p><strong>Monthly Payment Due:</strong> ${{ loan.monthly_payment }}</p>

<form method="POST">
    <label>Amount ($):</label><br>
    <input type="number" step="0.01" name="amount" required><br><br>

    <label>Payment Date:</label><br>
    <input type="date" name="payment_date" required><br><br>

    <button type="submit">Record Payment</button>
    <a href="{{ url_for('finance.loan_detail', loan_id=loan.loan_id) }}">Cancel</a>
</form>
{% endblock %}
