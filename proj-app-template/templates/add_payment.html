{% extends 'layout.html' %}
{% block title %}Add payment{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">Record payment</h1>
        <p class="page-subtitle">Loan #{{ loan.loan_id }} · Monthly due: <strong>${{ loan.monthly_payment }}</strong></p>
    </div>
</div>

<div class="form-card form-card--narrow">
    <form method="POST" class="form-stack">
        <div class="form-group">
            <label for="amount">Amount ($)</label>
            <input type="number" id="amount" step="0.01" name="amount" required>
        </div>

        <div class="form-group">
            <label for="payment_date">Payment date</label>
            <input type="date" id="payment_date" name="payment_date" required>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn--primary">Record payment</button>
            <a href="{{ url_for('finance.loan_detail', loan_id=loan.loan_id) }}" class="btn btn--secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
