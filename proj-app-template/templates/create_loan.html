{% extends 'layout.html' %}
{% block title %}Create loan{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">Create loan</h1>
        <p class="page-subtitle">Link a customer and vehicle to new financing.</p>
    </div>
</div>

<div class="form-card form-card--narrow">
    <form method="POST" class="form-stack">
        <div class="form-group">
            <label for="customer_id">Customer</label>
            <select id="customer_id" name="customer_id" required>
                <option value="">Select customer</option>
                {% for c in customers %}
                <option value="{{ c.customer_id }}">{{ c.customer_name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="vehicle_id">Vehicle</label>
            <select id="vehicle_id" name="vehicle_id" required>
                <option value="">Select vehicle</option>
                {% for v in vehicles %}
                <option value="{{ v.vehicle_id }}">{{ v.vehicle_make }} {{ v.vehicle_model }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="loan_amount">Loan amount ($)</label>
            <input type="number" id="loan_amount" step="0.01" name="loan_amount" required>
        </div>

        <div class="form-group">
            <label for="interest_rate">Interest rate (%)</label>
            <input type="number" id="interest_rate" step="0.01" name="interest_rate" required>
        </div>

        <div class="form-group">
            <label for="loan_term">Term (months)</label>
            <input type="number" id="loan_term" name="loan_term" required>
        </div>

        <div class="form-group">
            <label for="monthly_payment">Monthly payment ($)</label>
            <input type="number" id="monthly_payment" step="0.01" name="monthly_payment" required>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn--primary">Create loan</button>
            <a href="{{ url_for('finance.loans') }}" class="btn btn--secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
