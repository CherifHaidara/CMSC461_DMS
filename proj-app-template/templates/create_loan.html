{% extends 'layout.html' %}
{% block title %}Create Loan{% endblock %}

{% block content %}
<h2>Create New Loan</h2>
<form method="POST">
    <label>Customer:</label><br>
    <select name="customer_id" required>
        <option value="">-- Select Customer --</option>
        {% for c in customers %}
        <option value="{{ c.customer_id }}">{{ c.customer_name }}</option>
        {% endfor %}
    </select><br><br>

    <label>Vehicle:</label><br>
    <select name="vehicle_id" required>
        <option value="">-- Select Vehicle --</option>
        {% for v in vehicles %}
        <option value="{{ v.vehicle_id }}">{{ v.vehicle_make }} {{ v.vehicle_model }}</option>
        {% endfor %}
    </select><br><br>

    <label>Loan Amount ($):</label><br>
    <input type="number" step="0.01" name="loan_amount" required><br><br>

    <label>Interest Rate (%):</label><br>
    <input type="number" step="0.01" name="interest_rate" required><br><br>

    <label>Loan Term (months):</label><br>
    <input type="number" name="loan_term" required><br><br>

    <label>Monthly Payment ($):</label><br>
    <input type="number" step="0.01" name="monthly_payment" required><br><br>

    <button type="submit">Create Loan</button>
    <a href="{{ url_for('finance.loans') }}">Cancel</a>
</form>
{% endblock %}
